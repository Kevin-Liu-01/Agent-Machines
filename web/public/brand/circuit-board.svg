<svg xmlns="http://www.w3.org/2000/svg" width="384" height="512" viewBox="0 0 384 512" fill="none" shape-rendering="geometricPrecision">
  <title>Agent Machines circuit texture</title>
  <defs>
    <style>
      .bus{stroke:#fff;stroke-width:2;stroke-linecap:square;stroke-linejoin:miter;vector-effect:non-scaling-stroke}
      .trace{stroke:#fff;stroke-width:1.45;stroke-linecap:square;stroke-linejoin:miter;vector-effect:non-scaling-stroke}
      .fine{stroke:#fff;stroke-width:1;stroke-linecap:square;stroke-linejoin:miter;vector-effect:non-scaling-stroke}
      .pad{fill:none;stroke:#fff;stroke-width:1.6;vector-effect:non-scaling-stroke}
      .pin{fill:#fff}
      .chip{stroke:#fff;stroke-width:1.6;vector-effect:non-scaling-stroke}
    </style>
    <mask id="trace-clearance" x="0" y="0" width="384" height="512" maskUnits="userSpaceOnUse">
      <rect width="384" height="512" fill="#fff"/>
      <g fill="#000">
        <circle cx="118" cy="48" r="8.8"/>
        <circle cx="166" cy="88" r="8.8"/>
        <circle cx="196" cy="152" r="8.8"/>
        <circle cx="258" cy="152" r="8.8"/>
        <circle cx="66" cy="228" r="8.8"/>
        <circle cx="70" cy="274" r="8.8"/>
        <circle cx="288" cy="239" r="8.8"/>
        <circle cx="300" cy="266" r="8.8"/>
        <circle cx="186" cy="348" r="8.8"/>
        <circle cx="248" cy="406" r="8.8"/>
        <circle cx="166" cy="462" r="8.8"/>
        <circle cx="252" cy="462" r="8.8"/>
        <rect x="28.5" y="219.5" width="17" height="17" rx="2.5"/>
        <rect x="30.5" y="265.5" width="17" height="17" rx="2.5"/>
        <rect x="336.5" y="187.5" width="17" height="17" rx="2.5"/>
        <rect x="338.5" y="295.5" width="17" height="17" rx="2.5"/>
      </g>
    </mask>
  </defs>
  <rect width="384" height="512" fill="transparent"/>
  <g mask="url(#trace-clearance)">

  <!-- Edge buses. These terminate cleanly at tile edges so repeats stay crisp. -->
  <g opacity=".34">
    <path class="fine" d="M0 28h42l20 20h56"/>
    <path class="fine" d="M0 70h70l18 18h78"/>
    <path class="fine" d="M0 448h54l30-30h76"/>
    <path class="fine" d="M0 486h78l24-24h64"/>
    <path class="fine" d="M384 34h-58l-24 24h-64"/>
    <path class="fine" d="M384 82h-46l-42 42h-70"/>
    <path class="fine" d="M384 420h-74l-22 22h-72"/>
    <path class="fine" d="M384 474h-42l-28-28h-62"/>
  </g>

  <!-- Top-left island. -->
  <g opacity=".62">
    <rect class="chip" x="42" y="116" width="58" height="58"/>
    <path class="fine" d="M54 104v12M70 104v12M86 104v12M54 174v12M70 174v12M86 174v12M30 128h12M30 144h12M30 160h12M100 128h12M100 144h12M100 160h12"/>
    <path class="trace" d="M112 128h60l24 24h62"/>
    <path class="trace" d="M112 144h42l22 22h70"/>
    <path class="trace" d="M112 160h28l30 30h42"/>
    <path class="trace" d="M42 128H18v62h58"/>
    <path class="trace" d="M42 160H0"/>
  </g>

  <!-- Upper-right sensor cluster. -->
  <g opacity=".5">
    <rect class="chip" x="278" y="42" width="46" height="46"/>
    <path class="fine" d="M290 32v10M302 32v10M314 32v10M290 88v10M302 88v10M314 88v10M268 54h10M268 66h10M268 78h10M324 54h10M324 66h10M324 78h10"/>
    <path class="trace" d="M278 54h-48l-20 20h-44"/>
    <path class="trace" d="M278 66h-28l-30 30h-72"/>
    <path class="trace" d="M324 78h34v46h26"/>
  </g>

  <!-- Central processor: pins, buses, and terminal pads share centerlines. -->
  <g opacity=".72">
    <rect class="chip" x="146" y="206" width="92" height="92" rx="1.5"/>
    <rect class="fine" x="158" y="218" width="68" height="68" rx="1" opacity=".42"/>
    <path class="fine" opacity=".36" d="M176 228h32l10 10v28l-10 10h-32l-10-10v-28z"/>
    <circle class="pad" cx="192" cy="252" r="8.5" opacity=".68"/>
    <path class="fine" opacity=".62" d="M184 252h16M192 244v16M186 246l12 12M198 246l-12 12"/>
    <path class="fine" d="M160 192v14M176 192v14M192 192v14M208 192v14M224 192v14M160 298v14M176 298v14M192 298v14M208 298v14M224 298v14M130 226h16M130 239h16M130 252h16M130 266h16M130 279h16M238 226h16M238 239h16M238 252h16M238 266h16M238 279h16"/>
    <path class="bus" d="M0 228h66l26 24h38"/>
    <path class="bus" d="M0 274h70l28-8h32"/>
    <path class="bus" d="M254 239h34l34-43h62"/>
    <path class="bus" d="M254 266h46l26 38h58"/>
    <path class="trace" d="M192 206v-30l24-24h54"/>
    <path class="trace" d="M208 298v40l22 22h54"/>
  </g>

  <!-- Left lower memory lanes. -->
  <g opacity=".52">
    <rect class="chip" x="54" y="336" width="66" height="52"/>
    <path class="fine" d="M66 324v12M82 324v12M98 324v12M66 388v12M82 388v12M98 388v12M42 348h12M42 362h12M42 376h12M120 348h12M120 362h12M120 376h12"/>
    <path class="trace" d="M132 348h54l24-24h44"/>
    <path class="trace" d="M132 362h70l28-28h58"/>
    <path class="trace" d="M132 376h38l30 30h48"/>
    <path class="trace" d="M54 348H22v38H0"/>
    <path class="trace" d="M54 376H28v52h56"/>
  </g>

  <!-- Bottom-right IO block. -->
  <g opacity=".56">
    <rect class="chip" x="282" y="344" width="48" height="64"/>
    <path class="fine" d="M294 332v12M306 332v12M318 332v12M294 408v12M306 408v12M318 408v12M270 358h12M270 374h12M270 390h12M330 358h12M330 374h12M330 390h12"/>
    <path class="trace" d="M282 358h-48l-24-24h-40"/>
    <path class="trace" d="M282 374h-34l-30 30h-44"/>
    <path class="trace" d="M330 390h32v42h22"/>
  </g>

  <!-- Fine fill traces. They use empty corridors between islands. -->
  <g opacity=".38">
    <path class="fine" d="M18 316h64l28-28h30"/>
    <path class="fine" d="M0 356h34l32-32h74"/>
    <path class="fine" d="M18 96h60l30 30"/>
    <path class="fine" d="M252 164h50l28-28h54"/>
    <path class="fine" d="M248 462h46l26 26h64"/>
    <path class="fine" d="M170 462h-46l-22 22H54"/>
  </g>
  </g>

  <!-- Pads and small terminals. Pads sit on endpoints, not intersections. -->
  <g opacity=".86">
    <circle class="pad" cx="118" cy="48" r="5.5"/>
    <circle class="pad" cx="166" cy="88" r="5.5"/>
    <circle class="pad" cx="196" cy="152" r="5.5"/>
    <circle class="pad" cx="258" cy="152" r="5.5"/>
    <circle class="pad" cx="66" cy="228" r="5.5"/>
    <circle class="pad" cx="70" cy="274" r="5.5"/>
    <circle class="pad" cx="288" cy="239" r="5.5"/>
    <circle class="pad" cx="300" cy="266" r="5.5"/>
    <circle class="pad" cx="186" cy="348" r="5.5"/>
    <circle class="pad" cx="248" cy="406" r="5.5"/>
    <circle class="pad" cx="166" cy="462" r="5.5"/>
    <circle class="pad" cx="252" cy="462" r="5.5"/>
    <rect class="pad" x="32" y="223" width="10" height="10"/>
    <rect class="pad" x="34" y="269" width="10" height="10"/>
    <rect class="pad" x="340" y="191" width="10" height="10"/>
    <rect class="pad" x="342" y="299" width="10" height="10"/>
    <circle class="pin" cx="62" cy="48" r="2"/>
    <circle class="pin" cx="102" cy="462" r="2"/>
    <circle class="pin" cx="322" cy="124" r="2"/>
    <circle class="pin" cx="314" cy="446" r="2"/>
  </g>
</svg>
